<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" width="200" height="120">
  <!-- Background -->
  <rect width="500" height="300" fill="#1a1a1a" rx="8"/>

  <!-- Geometric burst design (pink/red) -->
  <g fill="#f2157b">
    <!-- Teardrop shapes radiating outward -->
    <path d="M250 80 Q270 60 280 40 Q275 70 260 90 Z"/>
    <path d="M250 80 Q280 50 310 35 Q285 65 265 85 Z"/>
    <path d="M250 80 Q295 45 330 25 Q300 60 270 82 Z"/>
    <path d="M250 80 Q305 40 345 20 Q310 60 275 82 Z"/>

    <!-- Center circle with radiating dashes -->
    <circle cx="250" cy="110" r="8" fill="#f2157b"/>
    <circle cx="250" cy="95" r="4" fill="#f2157b"/>
    <circle cx="265" cy="100" r="3.5" fill="#f2157b"/>
    <circle cx="240" cy="98" r="3.5" fill="#f2157b"/>
    <circle cx="258" cy="120" r="3" fill="#f2157b"/>
    <circle cx="242" cy="120" r="3" fill="#f2157b"/>
  </g>

  <!-- Text -->
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">
    TRIBAL
  </text>
  <text x="250" y="230" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">
    ZONE
  </text>

  <!-- Tagline -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.8">
    Expressive accessories
  </text>
</svg>